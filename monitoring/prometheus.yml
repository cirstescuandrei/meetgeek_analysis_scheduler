global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: temporal-server
    static_configs:
      - targets: ["temporal:9091"]

  - job_name: temporal-worker
    static_configs:
      - targets: ["temporal-worker:9000"]

  - job_name: temporal-transcriber
    static_configs:
      - targets: ["temporal-transcriber:9000"]

  - job_name: kube-state-metrics
    static_configs:
      - targets: ["kube-state-metrics.kube-system.svc.cluster.local:8080"]

  - job_name: celery-exporter
    static_configs:
      - targets: ["celery-exporter:9808"]
