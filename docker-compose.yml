name: meetgeek-temporal

services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.29.6
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.50.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "8080:8080"

  worker:
    image: meetgeek-temporal-worker
    build:
      context: .
      dockerfile: implementations/temporal/worker/Dockerfile
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    restart: on-failure

  client:
    image: meetgeek-temporal-client
    build:
      context: .
      dockerfile: implementations/temporal/client/Dockerfile
    depends_on:
      - temporal
      - worker
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8000:8000"
    restart: on-failure

  redis:
    image: redis:7-alpine
    restart: on-failure

  flower:
    image: mher/flower:2.0.1
    depends_on:
      - redis
      - celery-worker
    command: ["celery", "--broker=redis://redis:6379/0", "flower", "--port=5555"]
    environment:
      FLOWER_UNAUTHENTICATED_API: "true"
    ports:
      - "5555:5555"
    restart: on-failure

  celery-worker:
    image: meetgeek-celery-worker
    build:
      context: .
      dockerfile: implementations/celery/worker/Dockerfile
    depends_on:
      - redis
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    restart: on-failure

  celery-client:
    image: meetgeek-celery-client
    build:
      context: .
      dockerfile: implementations/celery/client/Dockerfile
    depends_on:
      - redis
      - celery-worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8001:8000"
    restart: on-failure

volumes:
  temporal-postgres:
