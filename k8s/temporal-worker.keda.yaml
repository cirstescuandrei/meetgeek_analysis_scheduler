apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: temporal-worker
  namespace: meetgeek
spec:
  scaleTargetRef:
    name: temporal-worker
  minReplicaCount: 1
  maxReplicaCount: 20
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 2
              periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Pods
              value: 1
              periodSeconds: 30
  triggers:
    - type: temporal
      metadata:
        endpoint: temporal.meetgeek.svc.cluster.local:7233
        namespace: default
        taskQueue: meeting-analysis
        queueTypes: workflow,activity
        targetQueueSize: "100"
        activationTargetQueueSize: "10"
