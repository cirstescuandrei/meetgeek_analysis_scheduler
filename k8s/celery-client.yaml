apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-client
  namespace: meetgeek
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-client
  template:
    metadata:
      labels:
        app: celery-client
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: celery-client
          image: meetgeek-celery-client:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
          ports:
            - name: http
              containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: celery-client
  namespace: meetgeek
spec:
  type: NodePort
  selector:
    app: celery-client
  ports:
    - name: http
      port: 8000
      targetPort: 8000
