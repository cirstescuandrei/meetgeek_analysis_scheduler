apiVersion: v1
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: meetgeek
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: meetgeek
