apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: celery-worker
  namespace: meetgeek
spec:
  scaleTargetRef:
    name: celery-worker
  minReplicaCount: 1
  maxReplicaCount: 5
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 2
              periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 60
          policies:
            - type: Pods
              value: 1
              periodSeconds: 30
  triggers:
    - type: redis
      metadata:
        address: redis.meetgeek.svc.cluster.local:6379
        listName: meeting-analysis
        listLength: "100"
        activationListLength: "10"
        databaseIndex: "0"
