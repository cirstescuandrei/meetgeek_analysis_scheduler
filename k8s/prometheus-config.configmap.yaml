apiVersion: v1
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: temporal-server
        static_configs:
          - targets: ["temporal:9091"]

      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics.kube-system.svc.cluster.local:8080"]

      - job_name: celery-exporter
        static_configs:
          - targets: ["celery-exporter:9808"]

      # Per-pod discovery for the worker pools. Scraping through a Service only hits one
      # pod, so per-worker histograms (end-to-end latency) and counters are incomplete once
      # a pool scales out. Discovering each pod and summing by (le) recovers the full
      # histogram. job keeps the app name so existing job="temporal-worker" queries match.
      - job_name: meetgeek-workers
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [meetgeek]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: temporal-worker|temporal-transcriber|celery-worker
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: "9000"
            action: keep
          - source_labels: [__meta_kubernetes_pod_phase]
            regex: Running
            action: keep
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: job
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: meetgeek
