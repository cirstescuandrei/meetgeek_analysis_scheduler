apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: meetgeek
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      enableServiceLinks: false
      containers:
        - name: temporal-ui
          image: temporalio/ui:2.50.0
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
            - name: TEMPORAL_CORS_ORIGINS
              value: http://localhost:8080
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: meetgeek
spec:
  type: NodePort
  selector:
    app: temporal-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
