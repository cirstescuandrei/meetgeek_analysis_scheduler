apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-client
  namespace: meetgeek
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-client
  template:
    metadata:
      labels:
        app: temporal-client
    spec:
      initContainers:
        - name: wait-for-temporal
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z temporal 7233; do echo waiting for temporal; sleep 2; done"]
      containers:
        - name: temporal-client
          image: meetgeek-temporal-client:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
          ports:
            - name: http
              containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-client
  namespace: meetgeek
spec:
  type: NodePort
  selector:
    app: temporal-client
  ports:
    - name: http
      port: 8000
      targetPort: 8000
