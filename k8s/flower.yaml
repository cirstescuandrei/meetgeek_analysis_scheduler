apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower
  namespace: meetgeek
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower
  template:
    metadata:
      labels:
        app: flower
    spec:
      enableServiceLinks: false
      containers:
        - name: flower
          image: mher/flower:2.0.1
          args: ["celery", "--broker=redis://redis:6379/0", "flower", "--port=5555"]
          env:
            - name: FLOWER_UNAUTHENTICATED_API
              value: "true"
          ports:
            - containerPort: 5555
---
apiVersion: v1
kind: Service
metadata:
  name: flower
  namespace: meetgeek
spec:
  type: NodePort
  selector:
    app: flower
  ports:
    - name: http
      port: 5555
      targetPort: 5555
