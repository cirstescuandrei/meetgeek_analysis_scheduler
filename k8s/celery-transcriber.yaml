apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-transcriber
  namespace: meetgeek
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-transcriber
  template:
    metadata:
      labels:
        app: celery-transcriber
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: celery-transcriber
          image: meetgeek-celery-transcriber:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
