apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-data
  namespace: meetgeek
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: meetgeek
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          env:
            # Custom user so brokers/KEDA can connect remotely (the default
            # "guest" user is restricted to localhost).
            - name: RABBITMQ_DEFAULT_USER
              value: meetgeek
            - name: RABBITMQ_DEFAULT_PASS
              value: meetgeek
          # NOTE: RabbitMQ's consumer_timeout (default 30 min) bounds how long a
          # consumer may hold a delivery unacked before it is requeued. Our longest
          # task is ~12 min @ 200 MB, so the default suffices. For longer tasks, add
          # `consumer_timeout = <ms>` via a mounted /etc/rabbitmq/conf.d/*.conf.
          # Crucially this is independent of crash detection (connection-drop based),
          # which is the resiliency win over the Redis broker's visibility_timeout.
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rabbitmq-data
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: meetgeek
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
